version: 1

# ============================================================================
# Tracked files. Profiles below pick subsets via `tracked_files:` lists. `src` is
# resolved relative to `tracked/`; `dst` may use Jinja2 templating when
# `template: true` (only `{{ vscode_user_dir }}` is exposed today).
# ============================================================================
tracked_files:
  claude_md:
    src: claude/CLAUDE.md
    dst: ~/.claude/CLAUDE.md
    preserve_user_sections: true

  claude_settings:
    src: claude/settings.json
    dst: ~/.claude/settings.json

  claude_bd_skill:
    src: claude/skills/bd-reference/SKILL.md
    dst: ~/.claude/skills/bd-reference/SKILL.md

  claude_challenge_skill:
    src: claude/skills/challenge/SKILL.md
    dst: ~/.claude/skills/challenge/SKILL.md

  claude_wt_skill:
    src: claude/skills/wt-reference/SKILL.md
    dst: ~/.claude/skills/wt-reference/SKILL.md

  claude_agent_python_spec_reviewer:
    src: claude/agents/python-spec-reviewer.md
    dst: ~/.claude/agents/python-spec-reviewer.md

  claude_agent_python_substance_reviewer:
    src: claude/agents/python-substance-reviewer.md
    dst: ~/.claude/agents/python-substance-reviewer.md

  claude_agent_python_specifics_reviewer:
    src: claude/agents/python-specifics-reviewer.md
    dst: ~/.claude/agents/python-specifics-reviewer.md

  claude_agent_claude_md_spec_reviewer:
    src: claude/agents/claude-md-spec-reviewer.md
    dst: ~/.claude/agents/claude-md-spec-reviewer.md

  claude_agent_claude_md_form_reviewer:
    src: claude/agents/claude-md-form-reviewer.md
    dst: ~/.claude/agents/claude-md-form-reviewer.md

  claude_agent_claude_md_substance_reviewer:
    src: claude/agents/claude-md-substance-reviewer.md
    dst: ~/.claude/agents/claude-md-substance-reviewer.md

  claude_agent_claude_md_specifics_reviewer:
    src: claude/agents/claude-md-specifics-reviewer.md
    dst: ~/.claude/agents/claude-md-specifics-reviewer.md

  claude_agent_python_prose_reviewer:
    src: claude/agents/python-prose-reviewer.md
    dst: ~/.claude/agents/python-prose-reviewer.md

  claude_agent_claude_md_prose_reviewer:
    src: claude/agents/claude-md-prose-reviewer.md
    dst: ~/.claude/agents/claude-md-prose-reviewer.md

  claude_agent_markdown_prose_reviewer:
    src: claude/agents/markdown-prose-reviewer.md
    dst: ~/.claude/agents/markdown-prose-reviewer.md

  claude_skill_reviewing_python_code:
    src: claude/skills/reviewing-python-code/SKILL.md
    dst: ~/.claude/skills/reviewing-python-code/SKILL.md

  claude_skill_reviewing_claude_md:
    src: claude/skills/reviewing-claude-md/SKILL.md
    dst: ~/.claude/skills/reviewing-claude-md/SKILL.md

  claude_skill_reviewing_markdown:
    src: claude/skills/reviewing-markdown/SKILL.md
    dst: ~/.claude/skills/reviewing-markdown/SKILL.md

  claude_session_flow_skill:
    src: claude/skills/session-flow/SKILL.md
    dst: ~/.claude/skills/session-flow/SKILL.md
    preserve_user_sections: true

  claude_handoff_skill:
    src: claude/skills/handoff/SKILL.md
    dst: ~/.claude/skills/handoff/SKILL.md

  claude_pickup_skill:
    src: claude/skills/pickup/SKILL.md
    dst: ~/.claude/skills/pickup/SKILL.md

  claude_handoff_hook:
    src: claude/scripts/handoff-discovery.sh
    dst: ~/.claude/scripts/handoff-discovery.sh

  vscode_serv_settings:
    src: vscode/vm/settings.json
    dst: ~/.vscode-server/data/Machine/settings.json
    preserve_user_keys:
      - claudeCode.allowDangerouslySkipPermissions
      - claudeCode.initialPermissionMode
      # Nested-path archetype (setforge-nen.19): `[python]`'s `editor.fontSize`
      # is host-local while sibling formatter / actions stay tracked.
      - "[python] > editor.fontSize"

  vscode_workstation_settings:
    src: vscode/workstation/settings.json
    dst: "{{ vscode_user_dir }}/settings.json"
    template: true
    preserve_user_keys:
      - claudeCode.allowDangerouslySkipPermissions
      - claudeCode.initialPermissionMode

# ============================================================================
# Claude marketplaces — registered via `claude plugin marketplace add`.
# `claude-plugins-official` is Anthropic's default; listed here explicitly
# so a clean install doesn't depend on Claude pre-registering it.
# ============================================================================
marketplaces:
  claude-plugins-official:
    source: github
    repo: anthropics/claude-plugins-official
  llm-wiki:
    source: github
    repo: nvk/llm-wiki
  revdiff:
    source: github
    repo: umputun/revdiff

# ============================================================================
# Claude plugins — installed via `claude plugin install <name>@<marketplace>`.
# Pillar 3 reconciles these against the live install state.
# ============================================================================
claude_plugins:
  superpowers:
    marketplace: claude-plugins-official
  wiki:
    marketplace: llm-wiki
  revdiff:
    marketplace: revdiff
  revdiff-planning:
    marketplace: revdiff

# ============================================================================
# Profiles. Single `debian-vm` profile serves all three Debian-VM
# deployment targets (personal MacBook VM, work MacBook VM, work standalone
# VM). Work-VM overrides layer via three mechanisms:
#   1. `<setforge:user-section>` markers in CLAUDE.md for per-host content
#   2. `preserve_user_keys: [...]` on settings.json for diverging keys
#   3. Host-local `local.yaml` for additional plugins / marketplaces and
#      `claude.install_mode: local-clone` for offline-capable plugin install
# ============================================================================
profiles:
  debian-vm:
    # ─── Claude content (markdown, settings, skills, agents, commands) ───
    tracked_files:
      - claude_md
      - claude_settings
      - claude_session_flow_skill
      - claude_handoff_skill
      - claude_pickup_skill
      - claude_handoff_hook
      - claude_bd_skill
      - claude_wt_skill
      - claude_challenge_skill
      - claude_skill_reviewing_python_code
      - claude_skill_reviewing_claude_md
      - claude_skill_reviewing_markdown
      - claude_agent_python_spec_reviewer
      - claude_agent_python_substance_reviewer
      - claude_agent_python_specifics_reviewer
      - claude_agent_python_prose_reviewer
      - claude_agent_claude_md_spec_reviewer
      - claude_agent_claude_md_form_reviewer
      - claude_agent_claude_md_substance_reviewer
      - claude_agent_claude_md_specifics_reviewer
      - claude_agent_claude_md_prose_reviewer
      - claude_agent_markdown_prose_reviewer
      - vscode_serv_settings
      - vscode_workstation_settings
    # ─── Plugins (marketplace-sourced; offline via local-clone) ───
    claude_plugins:
      - superpowers
      - wiki
      - revdiff
      - revdiff-planning
    # ─── VS Code extensions ───
    extensions:
      include:
        - anthropic.claude-code
        - charliermarsh.ruff
        - esbenp.prettier-vscode
        - github.copilot-chat
        - gruntfuggly.todo-tree
        - mhutchie.git-graph
        - ms-python.debugpy
        - ms-python.python
        - ms-python.vscode-pylance
        - ms-python.vscode-python-envs
        - redhat.vscode-yaml
        - streetsidesoftware.code-spell-checker
        - tamasfe.even-better-toml
