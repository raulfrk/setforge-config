  # Canary degradation-probe shell snippet. Sourced (not owned) by the
  # host's ~/.zshrc + ~/.bashrc, so setforge never touches those rc files.
  claude_canary_snippet:
    src: shell/claude-canary.sh
    dst: ~/.config/setforge/claude-canary.sh

marketplaces:
  claude-plugins-official:
    source: github
    repo: anthropics/claude-plugins-official
  llm-wiki:
    source: github
    repo: nvk/llm-wiki
  revdiff:
    source: github
    repo: umputun/revdiff

# ============================================================================
# Claude plugins — installed via `claude plugin install <name>@<marketplace>`.
# Pillar 3 reconciles these against the live install state.
# ============================================================================
claude_plugins:
  superpowers:
    marketplace: claude-plugins-official
  wiki:
    marketplace: llm-wiki
  revdiff:
    marketplace: revdiff
  # revdiff-planning intentionally NOT managed here: its ExitPlanMode hook would
  # double-fire with Atelier's. setforge disables it (kept on disk so Atelier's
  # revdiff fallback can still call its launcher script). Re-adding it here would
  # re-enable the hook on the next install.

# ============================================================================
# Profiles. Single `debian-vm` profile serves all three Debian-VM
# deployment targets (personal MacBook VM, work MacBook VM, work standalone
# VM). Work-VM overrides layer via three mechanisms:
#   1. `<setforge:user-section>` markers in CLAUDE.md for per-host content
#   2. `preserve_user_keys: [...]` on settings.json for diverging keys
#   3. Host-local `local.yaml` for additional plugins / marketplaces and
#      `claude.install_mode: local-clone` for offline-capable plugin install
# ============================================================================
profiles:
  debian-vm:
    # ─── Claude content (markdown, settings, skills, agents, commands) ───
    tracked_files:
    - claude_md
    - claude_settings
    - claude_canary_snippet
    - claude_session_flow_skill
    - claude_handoff_skill
    - claude_pickup_skill
    - claude_atelier_skill
    - claude_atelier_serve
    - claude_atelier_gen
    - claude_atelier_annotation_format
    - claude_atelier_plan_hook
    - claude_atelier_kit_terminal
    - claude_atelier_kit_browser
    - claude_atelier_kit_device
    - claude_atelier_test
    - claude_atelier_test_tristate
    - claude_atelier_test_reviewed
    - claude_atelier_test_content_modes
    - claude_atelier_test_annotation_format
    - claude_atelier_test_plan_hook
    - claude_atelier_test_hide_toggle
    - claude_atelier_test_mockup_kit
    - claude_bd_skill
    - claude_wt_skill
    - claude_skill_reviewing_python_code
    - claude_skill_reviewing_claude_md
    - claude_skill_reviewing_markdown
    - claude_skill_reviewing_rust_code
    - claude_skill_reviewing_bd_leaks
    - claude_agent_python_spec_reviewer
    - claude_agent_python_substance_reviewer
    - claude_agent_python_specifics_reviewer
    - claude_agent_python_prose_reviewer
    - claude_agent_claude_md_spec_reviewer
    - claude_agent_claude_md_form_reviewer
    - claude_agent_claude_md_substance_reviewer
    - claude_agent_claude_md_specifics_reviewer
    - claude_agent_claude_md_prose_reviewer
    - claude_agent_markdown_prose_reviewer
    - claude_agent_pitfall_researcher
    - claude_agent_rust_spec_reviewer
    - claude_agent_rust_substance_reviewer
    - claude_agent_rust_specifics_reviewer
    - claude_agent_bd_leak_reviewer
    # ─── Plugins (marketplace-sourced; offline via local-clone) ───
    claude_plugins:
    - superpowers
    - wiki
    - revdiff
schema_version: '2.0'
minimum_version: '2.0'
