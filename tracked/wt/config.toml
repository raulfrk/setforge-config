# Worktrunk user config — deployed by setforge.
#
# Default `wt merge` mode: --no-squash with fast-forward only.
# Required by the canonical phase flow's observation F: review-fix
# commits land as separate commits and must NOT be squashed into the
# implementation commit. Without this, a bare `wt merge` would
# silently violate observation F.
# See tracked/claude/superpowers-prefs.md Phase 6 + Commits section.

# Worktree path: land new worktrees under ~/projects/worktrees/<slug>,
# matching the workflow convention documented in tracked/claude/CLAUDE.md.
# Keeps the bd↔wt loop's slug = branch name convention and gives one
# canonical directory to ls / clean up. See setforge-xxg.
worktree-path = "~/projects/worktrees/{{ branch | sanitize }}"

[merge]
squash = false
ff = true
